<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TREE — Storyboard Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #e8e0d0;
      font-family: 'Georgia', serif;
      overflow: hidden;
      height: 100vh;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
    }

    canvas { display: block; width: 100% !important; height: 100% !important; }

    /* Top bar */
    #topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 48px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.85), transparent);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      z-index: 10;
      pointer-events: none;
    }

    #title {
      font-size: 13px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #c8b896;
      opacity: 0.9;
    }

    #shot-label {
      font-size: 12px;
      color: #888;
      letter-spacing: 0.05em;
    }

    /* Shot navigation */
    #nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 20px 24px;
      background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
      display: flex;
      align-items: flex-end;
      gap: 16px;
      z-index: 10;
    }

    .shot-btn {
      flex: 1;
      padding: 10px 8px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 4px;
      color: #aaa;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .shot-btn:hover { background: rgba(255,255,255,0.12); color: #ddd; }

    .shot-btn.active {
      background: rgba(200,184,150,0.15);
      border-color: #c8b896;
      color: #c8b896;
    }

    .shot-btn .shot-id {
      display: block;
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 3px;
      color: inherit;
    }

    .shot-btn .shot-name {
      display: block;
      font-size: 9px;
      opacity: 0.7;
      line-height: 1.3;
    }

    /* Arrow controls */
    #arrows {
      display: flex;
      gap: 8px;
      align-self: center;
    }

    .arrow-btn {
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px;
      color: #aaa;
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .arrow-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }

    /* Character info overlay */
    #char-info {
      position: fixed;
      top: 60px; right: 20px;
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      padding: 12px 16px;
      font-size: 11px;
      line-height: 1.6;
      max-width: 220px;
      z-index: 10;
      display: none;
    }

    #char-info .who { color: #c8b896; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
    #char-info .where { color: #888; }
    #char-info .when { color: #666; font-size: 10px; margin-top: 4px; }

    /* Loading overlay */
    #loading {
      position: fixed;
      inset: 0;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      gap: 16px;
    }

    #loading .logo { font-size: 32px; letter-spacing: 0.3em; color: #c8b896; }
    #loading .sub { font-size: 16px; letter-spacing: 0.1em; color: #c8b896; margin-top: 8px; }
    #loading .bar-wrap { width: 300px; height: 6px; background: #1a1a1a; border-radius: 3px; overflow: hidden; margin-top: 16px; }
    #loading .bar { height: 100%; background: #c8b896; width: 0%; transition: width 0.3s; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="logo">TREE</div>
    <div class="sub">Loading World</div>
    <div class="bar-wrap"><div class="bar" id="load-bar"></div></div>
  </div>

  <div id="canvas-container"></div>

  <div id="topbar">
    <span id="title">TREE — Scene 01</span>
    <span id="shot-label"></span>
  </div>

  <div id="char-info">
    <div class="who" id="ci-who"></div>
    <div class="where" id="ci-where"></div>
    <div class="when" id="ci-when"></div>
  </div>

  <div id="nav">
    <div id="arrows">
      <button class="arrow-btn" id="btn-prev">&#8592;</button>
      <button class="arrow-btn" id="btn-next">&#8594;</button>
    </div>
  </div>

  <script type="module" src="./scene.js"></script>
</body>
</html>
